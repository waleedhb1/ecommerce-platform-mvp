<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>متجر نواة | لوحة إدارة المتجر</title>
  <meta name="description" content="متجر نواة — منصة تجارة إلكترونية مستوحاة من سلة/زد — نموذج تصميم إداري" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="shell">
    <aside class="sidebar">
      <header class="brand">
        <div class="brand-seal" aria-hidden="true">
          <svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" fill="none" stroke="currentColor" stroke-width="1.5"/><text x="24" y="29" text-anchor="middle" font-size="14" font-weight="700" fill="currentColor">ن</text></svg>
        </div>
        <div class="brand-text">
          <span class="brand-org">متجر نواة</span>
          <span class="brand-sys">منصة تجارة إلكترونية</span>
        </div>
      </header>
      <nav id="nav" class="nav" aria-label="القائمة الرئيسية"></nav>
      <div class="sidebar-meta">
        <div class="term-pill">المبيعات اليوم <span class="num" id="sidebar-sales">—</span> <span class="num-suffix">ر.س</span></div>
        <label class="field-label" for="store-select">المتجر النشط</label>
        <select id="store-select" class="select">
          <option value="main">متجر نواة — الرئيسي</option>
          <option value="riyadh">فرع الرياض</option>
          <option value="jeddah">فرع جدة</option>
        </select>
      </div>
    </aside>
    <div class="workspace">
      <header class="topbar">
        <div class="topbar-start">
          <nav class="breadcrumb" id="breadcrumb" aria-label="مسار التنقل"></nav>
          <h1 id="page-title" class="page-title"></h1>
          <p id="page-sub" class="page-sub"></p>
        </div>
        <div class="topbar-end">
          <label class="search-field">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>
            <input type="search" id="global-search" placeholder="بحث بالطلب أو العميل أو المنتج..." />
          </label>
          <button type="button" class="icon-btn" id="notif-btn" aria-label="الإشعارات">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2c0 .5-.2 1-.6 1.4L4 17h5"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>
            <span class="badge-count">7</span>
          </button>
          <div class="profile">
            <div class="profile-avatar">و.ع</div>
            <div class="profile-info">
              <strong>وليد العتيبي</strong>
              <span id="profile-role">مدير المتجر</span>
            </div>
          </div>
        </div>
      </header>
      <main id="view" class="content"></main>
      <footer class="app-footer">
        <span>متجر نواة — جميع الحقوق محفوظة</span>
        <span class="num">v1.0.0</span>
        <span class="footer-note">بيانات وهمية — للعرض التوضيحي فقط</span>
      </footer>
    </div>
  </div>
  <div id="toast" class="toast" role="status" hidden></div>
  <div id="modal-root"></div>
  <script src="js/utils.js"></script>
  <script src="js/mock-api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
